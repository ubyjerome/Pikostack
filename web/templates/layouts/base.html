<!DOCTYPE html>
<html lang="en" class="dark" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}} — Pikoview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          colors: {
            brand: {
              50:  '#f5f3ff',
              100: '#ede9fe',
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              900: '#4c1d95',
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.3s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0', transform: 'translateY(4px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
    .log-output { font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .status-dot-blink { animation: blink 2s infinite; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 dark min-h-screen flex" x-data="pikoview()" x-init="init()">

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col flex-shrink-0 h-screen sticky top-0">

    <!-- Brand -->
    <div class="px-5 py-5 border-b border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div>
          <div class="font-semibold text-white text-sm leading-tight tracking-tight">Pikostack</div>
          <div class="text-xs text-slate-500 leading-tight">Pikoview</div>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto scrollbar-thin">
      {{$p := .CurrentPath}}
      <a href="/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-all group {{if eq $p "/"}}bg-brand-600/20 text-brand-400 font-medium{{else}}text-slate-400 hover:text-slate-100 hover:bg-slate-800/60{{end}}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="/services" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-all group {{if eq $p "/services"}}bg-brand-600/20 text-brand-400 font-medium{{else}}text-slate-400 hover:text-slate-100 hover:bg-slate-800/60{{end}}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/></svg>
        Services
      </a>
      <a href="/deploy" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-all group {{if eq $p "/deploy"}}bg-brand-600/20 text-brand-400 font-medium{{else}}text-slate-400 hover:text-slate-100 hover:bg-slate-800/60{{end}}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Deploy
      </a>
      <a href="/analytics" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-all group {{if eq $p "/analytics"}}bg-brand-600/20 text-brand-400 font-medium{{else}}text-slate-400 hover:text-slate-100 hover:bg-slate-800/60{{end}}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Analytics
      </a>
      <a href="/settings" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-all group {{if eq $p "/settings"}}bg-brand-600/20 text-brand-400 font-medium{{else}}text-slate-400 hover:text-slate-100 hover:bg-slate-800/60{{end}}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Settings
      </a>
    </nav>

    <!-- System stats — owned entirely by Alpine, no HTMX swap -->
    <div class="px-4 py-4 border-t border-slate-800">
      <div class="space-y-3">
        <div class="text-xs text-slate-500 uppercase tracking-wider font-medium">Host</div>
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <span class="text-xs text-slate-400">CPU</span>
            <span class="text-xs font-mono text-slate-300" x-text="sysStats.cpu !== undefined ? sysStats.cpu + '%' : '…'">…</span>
          </div>
          <div class="w-full bg-slate-800 rounded-full h-1.5">
            <div class="bg-brand-600 h-1.5 rounded-full transition-all duration-700"
                 :style="'width:' + (sysStats.cpu || 0) + '%'"></div>
          </div>
          <div class="flex items-center justify-between mt-1">
            <span class="text-xs text-slate-400">MEM</span>
            <span class="text-xs font-mono text-slate-300" x-text="sysStats.mem_pct !== undefined ? sysStats.mem_pct + '%' : '…'">…</span>
          </div>
          <div class="w-full bg-slate-800 rounded-full h-1.5">
            <div class="bg-violet-500 h-1.5 rounded-full transition-all duration-700"
                 :style="'width:' + (sysStats.mem_pct || 0) + '%'"></div>
          </div>
          <div class="flex items-center justify-between mt-1">
            <span class="text-xs text-slate-400">DISK</span>
            <span class="text-xs font-mono text-slate-300" x-text="sysStats.disk_pct !== undefined ? sysStats.disk_pct + '%' : '…'">…</span>
          </div>
          <div class="w-full bg-slate-800 rounded-full h-1.5">
            <div class="bg-sky-500 h-1.5 rounded-full transition-all duration-700"
                 :style="'width:' + (sysStats.disk_pct || 0) + '%'"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Theme toggle -->
    <div class="px-4 py-3 border-t border-slate-800">
      <button @click="toggleTheme()"
              class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition text-sm">
        <svg x-show="isDark" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        <svg x-show="!isDark" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <span x-text="isDark ? 'Dark Mode' : 'Light Mode'"></span>
      </button>
    </div>
  </aside>

  <!-- ── Main content ──────────────────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col min-h-screen overflow-hidden">

    <!-- Top bar -->
    <header class="bg-slate-900/80 backdrop-blur border-b border-slate-800 px-6 py-3.5 flex items-center justify-between sticky top-0 z-10">
      <div>
        <h1 class="text-base font-semibold text-white tracking-tight">{{.Title}}</h1>
        <p class="text-xs text-slate-500 mt-0.5">Pikoview — service management dashboard</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-1.5 text-xs text-slate-400 bg-slate-800/60 px-2.5 py-1.5 rounded-lg">
          <span class="w-1.5 h-1.5 rounded-full bg-slate-600" id="ws-dot"></span>
          <span id="ws-label">connecting…</span>
        </div>
        <a href="/deploy"
           class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-brand-600 hover:bg-brand-500 text-white text-sm font-medium rounded-lg transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Deploy
        </a>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 p-6 overflow-y-auto scrollbar-thin animate-fade-in">
      {{block "content" .}}{{end}}
    </main>
  </div>

  <!-- ── Toast notifications ───────────────────────────────────────────────── -->
  <div id="toast-container" class="fixed bottom-5 right-5 space-y-2 z-50"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
