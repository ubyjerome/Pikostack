{{define "partials/service_card.html"}}
<a href="/services/{{.ID}}"
   class="block bg-slate-800/40 border border-slate-700/50 rounded-xl p-4 hover:border-brand-600/40 hover:bg-slate-800/70 transition-all group">
  <div class="flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <div class="relative flex-shrink-0">
        <div class="w-9 h-9 rounded-lg bg-slate-700/80 flex items-center justify-center text-base">
          {{typeIcon .Type}}
        </div>
        <span class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border-2 border-slate-900 {{statusDot .Status}}
                     {{if eq (typeStr .Status) "running"}}dot-blink{{end}}"></span>
      </div>
      <div class="min-w-0">
        <div class="text-sm font-medium text-white truncate group-hover:text-brand-400 transition-colors">{{.Name}}</div>
        <div class="flex items-center gap-1.5 mt-0.5">
          <span class="text-xs text-slate-500">{{typeStr .Type}}</span>
          {{if .Ports}}<span class="text-xs text-slate-600">· {{.Ports}}</span>{{end}}
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2 flex-shrink-0">
      <span class="hidden sm:inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium {{statusBg .Status}}">
        {{typeStr .Status}}
      </span>
      <svg class="w-4 h-4 text-slate-600 group-hover:text-brand-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </div>
  </div>
</a>
{{end}}
