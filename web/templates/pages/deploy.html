{{template "layouts/base.html" .}}
{{define "content"}}
<div class="max-w-2xl mx-auto">
  <div class="mb-6">
    <h2 class="text-xl font-semibold text-white">Deploy Service</h2>
    <p class="text-sm text-slate-400 mt-0.5">Register a new service for Pikostack to manage</p>
  </div>

  <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
    <!-- Type selector -->
    <div class="px-6 pt-6 pb-4 border-b border-slate-800">
      <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Service Type</label>
      <div class="grid grid-cols-3 sm:grid-cols-5 gap-2" id="type-buttons">
        <button type="button" onclick="setType('docker')" data-type="docker"
                class="type-btn flex flex-col items-center gap-1.5 p-3 rounded-xl border border-slate-700 bg-slate-800/60 hover:border-brand-500/50 transition-all text-center">
          <span class="text-2xl">🐳</span>
          <span class="text-xs text-slate-400">docker</span>
        </button>
        <button type="button" onclick="setType('compose')" data-type="compose"
                class="type-btn flex flex-col items-center gap-1.5 p-3 rounded-xl border border-slate-700 bg-slate-800/60 hover:border-brand-500/50 transition-all text-center">
          <span class="text-2xl">🐙</span>
          <span class="text-xs text-slate-400">compose</span>
        </button>
        <button type="button" onclick="setType('process')" data-type="process"
                class="type-btn flex flex-col items-center gap-1.5 p-3 rounded-xl border border-slate-700 bg-slate-800/60 hover:border-brand-500/50 transition-all text-center">
          <span class="text-2xl">⚙</span>
          <span class="text-xs text-slate-400">process</span>
        </button>
        <button type="button" onclick="setType('systemd')" data-type="systemd"
                class="type-btn flex flex-col items-center gap-1.5 p-3 rounded-xl border border-slate-700 bg-slate-800/60 hover:border-brand-500/50 transition-all text-center">
          <span class="text-2xl">🔧</span>
          <span class="text-xs text-slate-400">systemd</span>
        </button>
        <button type="button" onclick="setType('url')" data-type="url"
                class="type-btn flex flex-col items-center gap-1.5 p-3 rounded-xl border border-slate-700 bg-slate-800/60 hover:border-brand-500/50 transition-all text-center">
          <span class="text-2xl">🌐</span>
          <span class="text-xs text-slate-400">url</span>
        </button>
        <button type="button" onclick="setType('static')" data-type="static"
                class="type-btn flex flex-col items-center gap-1.5 p-3 rounded-xl border border-slate-700 bg-slate-800/60 hover:border-brand-500/50 transition-all text-center">
          <span class="text-2xl">📁</span>
          <span class="text-xs text-slate-400">static</span>
        </button>
      </div>
    </div>

    <!-- Form fields -->
    <div class="px-6 py-5 space-y-5">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Service Name *</label>
          <input type="text" id="svc-name" placeholder="my-service"
                 class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-sm rounded-lg px-3 py-2.5 focus:border-brand-500 outline-none transition">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Description</label>
          <input type="text" id="svc-desc" placeholder="Optional"
                 class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-sm rounded-lg px-3 py-2.5 focus:border-brand-500 outline-none transition">
        </div>
      </div>

      <!-- process/systemd fields -->
      <div id="field-command" class="hidden">
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Command *</label>
        <input type="text" id="svc-command" placeholder="npm run start"
               class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-sm rounded-lg px-3 py-2.5 font-mono focus:border-brand-500 outline-none transition">
      </div>

      <div id="field-workdir" class="hidden">
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Working Directory</label>
        <input type="text" id="svc-workdir" placeholder="/home/user/myapp"
               class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-sm rounded-lg px-3 py-2.5 font-mono focus:border-brand-500 outline-none transition">
      </div>

      <!-- docker fields -->
      <div id="field-image" class="hidden">
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Docker Image *</label>
        <input type="text" id="svc-image" placeholder="nginx:latest"
               class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-sm rounded-lg px-3 py-2.5 font-mono focus:border-brand-500 outline-none transition">
      </div>

      <div id="field-ports" class="hidden">
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Ports</label>
        <input type="text" id="svc-ports" placeholder="8080:80, 443:443"
               class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-sm rounded-lg px-3 py-2.5 font-mono focus:border-brand-500 outline-none transition">
      </div>

      <!-- compose field -->
      <div id="field-composefile" class="hidden">
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Compose File Path *</label>
        <input type="text" id="svc-composefile" placeholder="/home/user/app/docker-compose.yml"
               class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-sm rounded-lg px-3 py-2.5 font-mono focus:border-brand-500 outline-none transition">
      </div>

      <!-- static fields -->
      <div id="field-staticdir" class="hidden">
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Static Files Directory *</label>
        <input type="text" id="svc-staticdir" placeholder="/home/user/myapp/dist"
               class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-sm rounded-lg px-3 py-2.5 font-mono focus:border-brand-500 outline-none transition">
        <p class="text-xs text-slate-500 mt-1">Pikostack will serve these files over HTTP using Python's http.server</p>
      </div>
      <div id="field-staticport" class="hidden">
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Port</label>
        <input type="number" id="svc-staticport" placeholder="8080" value="8080" min="1" max="65535"
               class="w-32 bg-slate-800 border border-slate-700 text-slate-100 text-sm rounded-lg px-3 py-2.5 focus:border-brand-500 outline-none transition">
      </div>

      <!-- health check -->
      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Health Check URL <span class="text-slate-600">(optional)</span></label>
        <input type="text" id="svc-health" placeholder="http://localhost:3000/health"
               class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-sm rounded-lg px-3 py-2.5 font-mono focus:border-brand-500 outline-none transition">
        <p class="text-xs text-slate-500 mt-1">Pikostack pings this URL to determine health instead of process state</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Project</label>
          <select id="svc-project"
                  class="w-full bg-slate-800 border border-slate-700 text-slate-300 text-sm rounded-lg px-3 py-2.5 focus:border-brand-500 outline-none">
            <option value="">No project</option>
            {{range .Projects}}
            <option value="{{.ID}}">{{.Name}}</option>
            {{end}}
          </select>
        </div>
        <div class="flex items-end pb-2.5">
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="svc-autorestart" checked class="w-4 h-4 accent-brand-600">
            <span class="text-sm text-slate-300">Auto-restart on failure</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 border-t border-slate-800 flex items-center justify-between gap-4">
      <a href="/services" class="text-sm text-slate-500 hover:text-slate-300 transition">Cancel</a>
      <button onclick="submitDeploy()"
              class="inline-flex items-center gap-2 px-5 py-2.5 bg-brand-600 hover:bg-brand-500 text-white text-sm font-semibold rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        Deploy Service
      </button>
    </div>
  </div>
</div>

<script>
let selectedType = 'process';

const fieldMap = {
  docker:  ['field-image', 'field-ports', 'field-workdir'],
  compose: ['field-composefile', 'field-workdir'],
  process: ['field-command', 'field-workdir'],
  systemd: ['field-command'],
  url:     [],
  static:  ['field-staticdir', 'field-staticport'],
};

function setType(t) {
  selectedType = t;
  // Update button styles
  document.querySelectorAll('.type-btn').forEach(b => {
    const isActive = b.dataset.type === t;
    b.classList.toggle('border-brand-500', isActive);
    b.classList.toggle('bg-brand-600/20', isActive);
    b.classList.toggle('border-slate-700', !isActive);
    b.classList.toggle('bg-slate-800/60', !isActive);
  });
  // Show/hide fields
  ['field-image','field-ports','field-workdir','field-command','field-composefile','field-staticdir','field-staticport'].forEach(f => {
    document.getElementById(f).classList.add('hidden');
  });
  (fieldMap[t] || []).forEach(f => document.getElementById(f).classList.remove('hidden'));
}

async function submitDeploy() {
  const name = document.getElementById('svc-name').value.trim();
  if (!name) { window.dispatchEvent(new CustomEvent('toast',{detail:{msg:'Service name is required',type:'error'}})); return; }

  const payload = {
    name,
    description:      document.getElementById('svc-desc').value,
    type:             selectedType,
    command:          document.getElementById('svc-command')?.value || '',
    work_dir:         document.getElementById('svc-workdir')?.value || '',
    image:            document.getElementById('svc-image')?.value || '',
    ports:            document.getElementById('svc-ports')?.value || '',
    compose_file:     document.getElementById('svc-composefile')?.value || '',
    static_dir:       document.getElementById('svc-staticdir')?.value || '',
    static_port:      parseInt(document.getElementById('svc-staticport')?.value || '8080'),
    health_check_url: document.getElementById('svc-health').value,
    project_id:       document.getElementById('svc-project').value || null,
    auto_restart:     document.getElementById('svc-autorestart').checked,
    watch_only:       selectedType === 'url',
  };

  const res = await fetch('/api/v1/services', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (res.ok) {
    window.dispatchEvent(new CustomEvent('toast',{detail:{msg:`Service "${name}" deployed`,type:'success'}}));
    setTimeout(() => location.href = '/services/' + data.id, 700);
  } else {
    window.dispatchEvent(new CustomEvent('toast',{detail:{msg:data.error||'Deploy failed',type:'error'}}));
  }
}

// Init default type
setType('process');
</script>
{{end}}
